name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # Build and test before creating release
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Build release binaries for multiple platforms
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: html2pdf-linux-x86_64
            cross: false

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive-name: html2pdf-linux-x86_64-musl
            cross: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive-name: html2pdf-linux-aarch64
            cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive-name: html2pdf-linux-aarch64-musl
            cross: true

          # macOS targets
          - target: x86_64-apple-darwin
            os: macos-latest
            archive-name: html2pdf-macos-x86_64
            cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            archive-name: html2pdf-macos-aarch64
            cross: false

          # Windows targets
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive-name: html2pdf-windows-x86_64
            cross: false
            binary-ext: .exe

          - target: i686-pc-windows-msvc
            os: windows-latest
            archive-name: html2pdf-windows-i686
            cross: true
            binary-ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/${{ matrix.archive-name }}
          cp target/${{ matrix.target }}/release/html2pdf dist/${{ matrix.archive-name }}/
          cp README.md LICENSE* dist/${{ matrix.archive-name }}/ 2>/dev/null || true
          cp CHANGELOG.md dist/${{ matrix.archive-name }}/ 2>/dev/null || true
          cd dist
          tar czf ${{ matrix.archive-name }}.tar.gz ${{ matrix.archive-name }}
          shasum -a 256 ${{ matrix.archive-name }}.tar.gz > ${{ matrix.archive-name }}.tar.gz.sha256

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\${{ matrix.archive-name }}
          Copy-Item target\${{ matrix.target }}\release\html2pdf.exe -Destination dist\${{ matrix.archive-name }}\
          Copy-Item README.md -Destination dist\${{ matrix.archive-name }}\ -ErrorAction SilentlyContinue
          Copy-Item LICENSE* -Destination dist\${{ matrix.archive-name }}\ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md -Destination dist\${{ matrix.archive-name }}\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\${{ matrix.archive-name }}\* -DestinationPath dist\${{ matrix.archive-name }}.zip -Force
          $hash = Get-FileHash -Path dist\${{ matrix.archive-name }}.zip -Algorithm SHA256
          $hash.Hash | Out-File -FilePath dist\${{ matrix.archive-name }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: dist/${{ matrix.archive-name }}.*
          if-no-files-found: error

  # Create GitHub release and upload binaries
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: html2pdf-*

      - name: Generate changelog
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate release notes
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md 2>/dev/null || echo "* Initial release" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Checksums" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| File | SHA256 |" >> RELEASE_NOTES.md
          echo "|------|--------|" >> RELEASE_NOTES.md
          for f in dist/html2pdf-*/*.sha256; do
            if [ -f "$f" ]; then
              filename=$(basename "${f%.sha256}")
              hash=$(cat "$f" | awk '{print $1}')
              echo "| $filename | \`$hash\` |" >> RELEASE_NOTES.md
            fi
          done
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Using cargo" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo "cargo install html2pdf" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Using the install script (Linux/macOS)" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo "curl --proto '=https' --tlsv1.2 -sSf https://html2pdf.dev/install.sh | sh" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.changelog.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist/html2pdf-*/*
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.version, 'alpha') || contains(steps.changelog.outputs.version, 'beta') || contains(steps.changelog.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io
  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify package
        run: cargo package --allow-dirty --list

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
