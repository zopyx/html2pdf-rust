# Cross-compilation configuration for html2pdf-rs
# https://github.com/cross-rs/cross

[build]
# Default build options
pre-build = [
    "apt-get update && apt-get install -y pkg-config",
]

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "RUST_LOG",
]

# Target-specific configurations
[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main"

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"
pre-build = [
    "apt-get update && apt-get install -y musl-tools pkg-config",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y pkg-config",
]

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:main"
pre-build = [
    "apt-get update && apt-get install -y musl-tools pkg-config",
]

[target.i686-unknown-linux-gnu]
image = "ghcr.io/cross-rs/i686-unknown-linux-gnu:main"

[target.armv7-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:main"
pre-build = [
    "dpkg --add-architecture armhf",
    "apt-get update && apt-get install -y pkg-config",
]

[target.armv7-unknown-linux-musleabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-musleabihf:main"

# macOS targets (typically built natively, but included for reference)
[target.x86_64-apple-darwin]
# macOS cross-compilation requires special setup
# Usually built on macOS runners

[target.aarch64-apple-darwin]
# Apple Silicon cross-compilation
# Usually built on macOS runners

# Windows targets
[target.x86_64-pc-windows-gnu]
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:main"

[target.i686-pc-windows-gnu]
image = "ghcr.io/cross-rs/i686-pc-windows-gnu:main"

# Environment variables for specific targets
[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc",
    "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++",
    "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar",
]

[target.x86_64-unknown-linux-musl.env]
passthrough = [
    "CC_x86_64_unknown_linux_musl=x86_64-linux-musl-gcc",
    "CXX_x86_64_unknown_linux_musl=x86_64-linux-musl-g++",
    "AR_x86_64_unknown_linux_musl=x86_64-linux-musl-ar",
]
